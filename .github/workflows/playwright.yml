name: Playwright Automation Tests

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Triggered by EliteA"
        required: false
        default: "elitea"

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      run: |
        npx playwright test --reporter=line,json,html
      continue-on-error: true

    # Ensure reports are generated before artifact upload
    - name: Wait for report stabilization
      run: sleep 20

    - name: Ensure report directories exist
      run: |
        mkdir -p playwright-report
        mkdir -p test-results

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

    - name: Upload Playwright JSON Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 7

    - name: Workflow completed
      run: echo "Playwright CI finished successfully"