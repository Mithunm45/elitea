name: Playwright Automation Tests

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Triggered by EliteA"
        required: false
        default: "elitea"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test --reporter=line,json,html
        continue-on-error: true

      # Ensure report folders exist
      - name: Ensure report directories exist
        run: |
          mkdir -p playwright-report
          mkdir -p test-results

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright JSON Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      # Notify Elitea after artifacts are uploaded
      - name: Notify Elitea Pipeline
        if: always()
        run: |
          curl -X POST https://next.elitea.ai/api/v1/pipelines/22/run \
          -H "Authorization: Bearer ${{ secrets.ELITEA_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
                "pipeline_id": "22",
                "inputs": {
                  "owner": "Mithunm45",
                  "repo": "elitea"
                }
              }'