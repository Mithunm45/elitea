name: Playwright Automation Tests

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Triggered by EliteA"
        required: false
        default: "elitea"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test --reporter=line,json,html
        continue-on-error: true

      - name: Ensure report directories exist
        run: |
          mkdir -p playwright-report
          mkdir -p test-results

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright JSON Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Notify ELITEA: runs after `test` job (pass OR fail)
  # Calls Pipeline B /predict — no HMAC, just Bearer token
  # ─────────────────────────────────────────────────────────────
  notify-elitea:
    runs-on: ubuntu-latest
    needs: test          # wait for the test job to fully finish
    if: always()         # fire even if test job failed

    steps:
      - name: Send workflow result to ELITEA Pipeline B
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ELITEA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "user_input": "{\"owner\": \"${{ github.repository_owner }}\", \"repo\": \"${{ github.event.repository.name }}\", \"run_id\": \"${{ github.run_id }}\"}"
            }' \
            --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            https://next.elitea.ai/api/v1/applications/predict/prompt_lib/${{ secrets.ELITEA_PROJECT_ID }}/${{ secrets.ELITEA_PIPELINE_B_VERSION_ID }}